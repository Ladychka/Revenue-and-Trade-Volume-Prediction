version: '3.8'

services:
  db_v2:
    image: postgres:16
    container_name: customs_v2_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customs_v2_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - pgdata_v3_clean:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customs_v2_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_v3_clean:
